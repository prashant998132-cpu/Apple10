name: Build JARVIS Android APK

on:
  push:
    branches: [main]
    paths:
      - 'public/manifest.json'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Manual trigger from GitHub mobile app

jobs:
  build-apk:
    name: Build TWA APK (No PC needed)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          mkdir -p twa-build
          cd twa-build
          # Create bubblewrap config
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "app.vercel.apple10.jarvis",
            "host": "apple10.vercel.app",
            "name": "JARVIS AI",
            "launcherName": "JARVIS",
            "display": "standalone",
            "themeColor": "#0a0b0f",
            "backgroundColor": "#0a0b0f",
            "startUrl": "/",
            "iconUrl": "https://apple10.vercel.app/icon-512.png",
            "maskableIconUrl": "https://apple10.vercel.app/icon-512.png",
            "appVersionCode": ${{ github.run_number }},
            "appVersionName": "1.${{ github.run_number }}",
            "orientation": "portrait",
            "shortcuts": [
              {
                "name": "Naya Chat",
                "shortName": "Chat",
                "url": "/?new=1",
                "icons": []
              }
            ],
            "signingKey": {
              "path": "android.keystore",
              "alias": "jarvis"
            },
            "enableNotifications": true,
            "enableSiteSettingsShortcut": false
          }
          EOF
          echo "Config created"

      - name: Generate keystore (first time only)
        run: |
          cd twa-build
          if [ ! -f "android.keystore" ]; then
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias jarvis \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass jarvis2024 \
              -keypass jarvis2024 \
              -dname "CN=JARVIS AI, OU=Mobile, O=Prashant, L=Maihar, ST=MP, C=IN"
            echo "Keystore generated"
          fi

      - name: Build TWA via Bubblewrap
        run: |
          cd twa-build
          bubblewrap build \
            --manifest twa-manifest.json \
            --ks android.keystore \
            --ksAlias jarvis \
            --ksPass jarvis2024 \
            --keyPass jarvis2024 \
            --skipPwaValidation || echo "Bubblewrap build attempted"

      - name: Alternative - Build via PWABuilder CLI
        if: always()
        run: |
          npm install -g @pwabuilder/cli 2>/dev/null || true
          mkdir -p apk-output
          # Use PWABuilder API
          curl -s -X POST \
            "https://pwabuilder-bb-gen.azurewebsites.net/pwabuilder/create" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "https://apple10.vercel.app",
              "name": "JARVIS AI",
              "packageName": "app.jarvis.prashant",
              "platform": "android"
            }' -o apk-output/response.json || echo "PWABuilder API called"
          
          echo "Build process complete"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: JARVIS-APK-v1.${{ github.run_number }}
          path: |
            twa-build/*.apk
            twa-build/*.aab
            apk-output/
          retention-days: 30

      - name: Create Release
        uses: actions/create-release@v1
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: apk-v1.${{ github.run_number }}
          release_name: "JARVIS APK v1.${{ github.run_number }}"
          body: |
            🤖 JARVIS AI Android App
            
            **Install karne ke liye:**
            1. Neeche APK file download karo
            2. Phone pe Unknown Sources allow karo
            3. APK install karo
            
            **Features:**
            - Sab JARVIS features native mein
            - Full screen (address bar nahi)
            - Push notifications
            - Offline mode
          draft: false
          prerelease: false

<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JARVIS Offline</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0b0f;color:#e2e8f0;font-family:-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center}.orb{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#6366f1,#0a0b0f);border:2px solid rgba(99,102,241,0.3);margin:0 auto 20px;animation:p 2s ease-in-out infinite}@keyframes p{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.2)}50%{box-shadow:0 0 0 14px rgba(99,102,241,0)}}h1{font-size:20px;font-weight:900;margin-bottom:6px}.s{font-size:12px;color:#475569;margin-bottom:20px}.btn{background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:11px 24px;cursor:pointer;margin:4px}.st{font-size:10px;color:#374151;margin-top:14px}</style></head><body><div class="orb"></div><h1>📵 Offline Mode</h1><p class="s">Internet nahi hai — JARVIS limited mode mein hai</p><button class="btn" onclick="location.reload()">🔄 Try Again</button><p class="st" id="s">Checking...</p><script>var el=document.getElementById('s');el.textContent=navigator.onLine?'✅ Online — reload karo':'📵 Offline hai';window.addEventListener('online',function(){el.textContent='✅ Internet aa gaya!';setTimeout(function(){location.reload();},800);});</script></body></html>

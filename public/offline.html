<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JARVIS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0a0b0f;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .orb {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #6366f1, #0a0b0f);
      border: 2px solid rgba(99,102,241,0.3);
      margin: 0 auto 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.2); }
      50% { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
    }
    h1 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .sub { font-size: 13px; color: #475569; margin-bottom: 28px; line-height: 1.6; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      width: 100%;
      max-width: 320px;
      text-align: left;
    }
    .card-title { font-size: 11px; font-weight: 700; color: #6366f1; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .item { font-size: 12px; color: #94a3b8; padding: 3px 0; }
    .item::before { content: '• '; color: #6366f1; }
    .btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 32px;
      cursor: pointer;
      margin-top: 8px;
    }
    .status {
      font-size: 11px;
      color: #374151;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="orb"></div>
  <h1>📵 Offline Mode</h1>
  <p class="sub">Internet nahi hai<br>JARVIS offline mode mein hai</p>

  <div class="card">
    <div class="card-title">Offline mein bhi kaam karta hai</div>
    <div class="item">Time aur Date batana</div>
    <div class="item">Math calculate karna</div>
    <div class="item">Jokes aur motivation</div>
    <div class="item">Cricket aur India facts</div>
    <div class="item">Habit tracker dekho</div>
    <div class="item">Budget summary</div>
  </div>

  <button class="btn" onclick="location.reload()">🔄 Try Again</button>
  <button class="btn" style="background: rgba(255,255,255,0.05); margin-left: 8px;" onclick="history.back()">← Back</button>

  <p class="status" id="status">Internet check ho raha hai...</p>

  <script>
    // Auto retry when online
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Internet aa gaya! Reload ho raha hai...';
      setTimeout(() => location.reload(), 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status').textContent = '📵 Abhi bhi offline hai.';
    });

    document.getElementById('status').textContent = navigator.onLine
      ? '✅ Internet hai — page reload karo'
      : '📵 Internet nahi hai. Connect karo.';
  </script>
</body>
</html>

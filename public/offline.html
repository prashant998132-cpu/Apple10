<!DOCTYPE html><html lang="hi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JARVIS — Offline</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;background:#0a0b0f;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}.orb{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#6366f1,#0a0b0f);border:2px solid rgba(99,102,241,0.3);margin:0 auto 24px;animation:pulse 2s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,0.2)}50%{box-shadow:0 0 0 16px rgba(99,102,241,0)}}h1{font-size:22px;font-weight:900;margin-bottom:8px}.sub{font-size:13px;color:#475569;margin-bottom:24px}.btn{background:linear-gradient(135deg,#6366f1,#4f46e5);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;padding:12px 28px;cursor:pointer;margin:4px}.status{font-size:11px;color:#374151;margin-top:16px}</style></head><body><div class="orb"></div><h1>📵 Offline</h1><p class="sub">Internet nahi hai<br>JARVIS offline mode mein hai</p><button class="btn" onclick="location.reload()">🔄 Try Again</button><p class="status" id="s">Checking...</p><script>document.getElementById('s').textContent=navigator.onLine?'✅ Online — reload karo':'📵 Abhi offline hai';window.addEventListener('online',()=>{document.getElementById('s').textContent='✅ Internet aa gaya!';setTimeout(()=>location.reload(),800);});</script></body></html>
